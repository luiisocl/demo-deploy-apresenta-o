<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Boas Práticas de Deploy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #0f0f1a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #1a1a2e; border: 1px solid #3b5998; border-radius: 16px; padding: 48px; max-width: 600px; text-align: center; }
    h1 { font-size: 2rem; color: #7986cb; margin-bottom: 12px; }
    p { color: #aaa; margin-bottom: 32px; line-height: 1.6; }
    .badge { display: inline-block; background: #3b5998; color: #fff; padding: 8px 20px; border-radius: 8px; font-size: 0.9rem; margin: 6px; }
    .status { margin-top: 32px; font-size: 0.85rem; color: #555; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Boas Práticas de Deploy</h1>
    <p>Pipeline CI/CD automatizado com GitHub Actions e Vercel.<br/>Cada push na main dispara build, testes e deploy automaticamente.</p>
    <div>
      <span class="badge">GitHub Actions</span>
      <span class="badge">Docker</span>
      <span class="badge">Vercel</span>
      <span class="badge">CI/CD</span>
    </div>
    <p class="status">UNINASSAU 2026 · Luís Guilherme</p>
  </div>
</body>
</html>
